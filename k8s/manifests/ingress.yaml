apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-web-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingresClassName: nginx
  rules:
  - host: go-web-app.local
    http:
      paths:
      - backend:
          service:
            name: go-web-app
            port:
              number: 80
        path: /path
        pathType: Prefix

